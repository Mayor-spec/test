<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - AI MCQ Pro</title>
    <style>
        :root { --primary: #4f46e5; --bg: #f8fafc; --text: #1e293b; --success: #10b981; --danger: #ef4444; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        .hidden { display: none !important; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        input, textarea, select { width: 100%; padding: 12px; margin-top: 10px; border: 1px solid #e2e8f0; border-radius: 6px; box-sizing: border-box; }
        button { border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; width: 100%; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-success { background: var(--success); color: white; width: 100%; }

        .tabs { display: flex; gap: 15px; margin-bottom: 20px; border-bottom: 2px solid #e2e8f0; }
        .tab-btn { background: none; border: none; padding: 10px; cursor: pointer; color: #64748b; }
        .tab-btn.active { color: var(--primary); border-bottom: 2px solid var(--primary); }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .modal-content { background: white; padding: 30px; border-radius: 15px; width: 90%; max-width: 600px; max-height: 85vh; overflow-y: auto; }

        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #f1f5f9; }
        .preview-item { border-bottom: 1px solid #eee; padding: 15px 0; }
    </style>
</head>
<body>

    <div class="container">
        <div id="authBox" class="card" style="max-width:400px; margin: 100px auto;">
            <h2 style="text-align:center">Admin Access</h2>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Password">
            <button id="loginBtn" class="btn-primary">Login</button>
        </div>

        <div id="dashboard" class="hidden">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h1>Admin Panel</h1>
                <button id="logoutBtn" class="btn-danger" style="margin-top:0">Logout</button>
            </div>

            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('create')">Create Quiz</button>
                <button class="tab-btn" onclick="switchTab('manage')">Manage Banks</button>
                <button class="tab-btn" onclick="switchTab('results')">Student Results</button>
            </div>

            <div id="createSec">
                <div class="card">
                    <h3>New Quiz Bank</h3>
                    <input type="text" id="bankName" placeholder="Bank Name (e.g. CHM 102)">
                    <input type="number" id="qTimer" placeholder="Seconds per question (e.g. 30)">
                    <textarea id="aiText" placeholder="Paste AI Questions here..." style="height: 150px;"></textarea>
                    <button onclick="parseAIContent()" class="btn-primary">1. Parse & Preview</button>
                </div>
                <div id="previewArea" class="card hidden">
                    <h3>Review Questions</h3>
                    <div id="previewList"></div>
                    <button id="saveBtn" class="btn-success">2. Save Bank to Cloud</button>
                </div>
            </div>

            <div id="manageSec" class="hidden">
                <div class="card">
                    <table><thead><tr><th>Bank Name</th><th>Timer</th><th>Action</th></tr></thead><tbody id="bankTable"></tbody></table>
                </div>
            </div>

            <div id="resultsSec" class="hidden">
                <div class="card">
                    <table><thead><tr><th>Student</th><th>Quiz</th><th>Score</th><th>Action</th></tr></thead><tbody id="resTable"></tbody></table>
                </div>
            </div>
        </div>
    </div>

    <div id="resModal" class="modal hidden">
        <div class="modal-content">
            <h2 id="mTitle">Attempt Detail</h2>
            <div id="mList"></div>
            <button onclick="closeModal()" class="btn-primary">Close Details</button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyACKQAD1sIUGdOjncQkfjMrmGh4x_U0v74",
        authDomain: "quiz-76725.firebaseapp.com",
        projectId: "quiz-76725",
        storageBucket: "quiz-76725.firebasestorage.app",
        messagingSenderId: "352657593612",
        appId: "1:352657593612:web:80054cb0dcdc3a97c1a529"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let tempQuestions = [];

    // --- Authentication ---
    document.getElementById('loginBtn').onclick = () => {
        signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value).catch(e => alert(e.message));
    };
    onAuthStateChanged(auth, u => {
        document.getElementById('authBox').classList.toggle('hidden', !!u);
        document.getElementById('dashboard').classList.toggle('hidden', !u);
    });
    document.getElementById('logoutBtn').onclick = () => signOut(auth);

    // --- Navigation ---
    window.switchTab = (t) => {
        document.getElementById('createSec').classList.toggle('hidden', t !== 'create');
        document.getElementById('manageSec').classList.toggle('hidden', t !== 'manage');
        document.getElementById('resultsSec').classList.toggle('hidden', t !== 'results');
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.toggle('active', btn.innerText.toLowerCase().includes(t)));
        if(t === 'manage') loadBanks();
        if(t === 'results') loadResults();
    };

    // --- Robust Parser ---
    window.parseAIContent = () => {
        const text = document.getElementById('aiText').value;
        tempQuestions = [];
        const blocks = text.split(/\n\s*(?=\d+[\.\)\s])/);
        
        blocks.forEach(b => {
            const lines = b.split('\n').filter(l => l.trim());
            if(lines.length < 3) return;
            
            const q = lines[0].replace(/^\d+[\.\)\s]*/, "");
            const opts = lines.filter(l => l.trim().match(/^[A-D][\.\)\s-]/i));
            const ansLine = lines.find(l => l.toLowerCase().match(/correct|ans:|answer/));
            const expLine = lines.find(l => l.toLowerCase().includes("explanation"));
            
            const cor = ansLine ? ansLine.match(/[A-D]/i)?.[0].toUpperCase() : "A";
            const exp = expLine ? expLine.split(/explanation:/i)[1].trim() : "No explanation provided.";

            tempQuestions.push({ question: q, options: opts, correct: cor, explanation: exp });
        });

        document.getElementById('previewList').innerHTML = tempQuestions.map(q => `
            <div class="preview-item">
                <b>${q.question}</b><br>
                <small style="color:green">Correct: ${q.correct}</small> | <i>${q.explanation}</i>
            </div>
        `).join('');
        document.getElementById('previewArea').classList.remove('hidden');
    };

    document.getElementById('saveBtn').onclick = async () => {
        const name = document.getElementById('bankName').value;
        if(!name) return alert("Please name your quiz bank!");
        await addDoc(collection(db, "quizzes"), {
            bankName: name,
            timePerQuestion: document.getElementById('qTimer').value || 30,
            questions: tempQuestions,
            date: new Date()
        });
        alert("Saved Successfully!"); location.reload();
    };

    // --- Data Management ---
    async function loadBanks() {
        const snap = await getDocs(collection(db, "quizzes"));
        const body = document.getElementById('bankTable');
        body.innerHTML = "";
        snap.forEach(d => {
            body.innerHTML += `<tr><td>${d.data().bankName}</td><td>${d.data().timePerQuestion}s</td><td><button onclick="delBank('${d.id}')" class="btn-danger">Delete</button></td></tr>`;
        });
    }
    window.delBank = async (id) => { if(confirm("Delete Bank?")) { await deleteDoc(doc(db, "quizzes", id)); loadBanks(); } };

    async function loadResults() {
        const snap = await getDocs(query(collection(db, "results"), orderBy("date", "desc")));
        const body = document.getElementById('resTable');
        body.innerHTML = "";
        snap.forEach(d => {
            const r = d.data();
            body.innerHTML += `<tr><td>${r.studentName}</td><td>${r.quizName}</td><td>${r.score}%</td><td><button onclick="viewDetail('${d.id}')" class="btn-primary">View Breakdown</button></td></tr>`;
        });
    }

    window.viewDetail = async (id) => {
        const snap = await getDocs(collection(db, "results"));
        const r = snap.docs.find(d => d.id === id).data();
        document.getElementById('mTitle').innerText = r.studentName + "'s Results";
        document.getElementById('mList').innerHTML = r.detailedAnswers.map(a => `
            <div style="margin-bottom:15px; padding:15px; border-radius:10px; background:${a.isCorrect ? '#dcfce7':'#fee2e2'}">
                <b>${a.question}</b><br>
                <div style="font-size:0.8em; margin:5px 0;">${a.options.join('<br>')}</div>
                <hr style="opacity:0.1">
                <b>Picked: ${a.selected} | Correct: ${a.correct}</b><br>
                <small><i>💡 ${a.explanation}</i></small>
            </div>
        `).join('');
        document.getElementById('resModal').classList.remove('hidden');
    };
    window.closeModal = () => document.getElementById('resModal').classList.add('hidden');
</script>
</body>
</html>
